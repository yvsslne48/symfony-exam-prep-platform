<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Symfony with LOUTCHEE — Plateforme d'apprentissage</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Sora:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0e0f14;
  --bg2: #13151d;
  --bg3: #1a1d28;
  --bg4: #222636;
  --surface: #1e2130;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #e8eaf0;
  --text2: #8b8fa8;
  --text3: #5a5e75;
  --purple: #7c6ef7;
  --purple-light: #a597ff;
  --purple-bg: rgba(124,110,247,0.12);
  --teal: #2dd4a8;
  --teal-bg: rgba(45,212,168,0.1);
  --coral: #f07a5a;
  --coral-bg: rgba(240,122,90,0.1);
  --amber: #f5c842;
  --amber-bg: rgba(245,200,66,0.1);
  --green: #5bdb8c;
  --green-bg: rgba(91,219,140,0.1);
  --red: #f06060;
  --red-bg: rgba(240,96,96,0.1);
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --display: 'Sora', sans-serif;
  --radius: 10px;
  --radius-lg: 16px;
  --radius-xl: 22px;
  --sidebar: 260px;
  --transition: 0.18s ease;
}
html { font-size: 15px; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  line-height: 1.65;
}
button { cursor: pointer; font-family: var(--sans); }
a { color: var(--purple-light); text-decoration: none; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

/* ===== LAYOUT ===== */
#layout { display: flex; min-height: 100vh; }

/* ===== SIDEBAR ===== */
#sidebar {
  width: var(--sidebar);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  overflow-y: auto;
  transition: transform var(--transition);
}
#sidebar-logo {
  padding: 1.4rem 1.2rem 1rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-icon {
  width: 34px; height: 34px;
  background: var(--purple-bg);
  border: 1px solid rgba(124,110,247,0.3);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
}
.logo-text { font-family: var(--display); font-weight: 700; font-size: 15px; color: var(--text); }
.logo-badge {
  font-size: 9px; background: var(--purple-bg); color: var(--purple-light);
  border: 1px solid rgba(124,110,247,0.25); border-radius: 4px; padding: 2px 5px;
  font-weight: 600; letter-spacing: 0.04em; margin-top: 1px;
}

#sidebar-nav { padding: 0.8rem 0.6rem; flex: 1; }
.nav-section-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
  color: var(--text3); text-transform: uppercase;
  padding: 0.6rem 0.6rem 0.3rem;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 0.55rem 0.75rem;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all var(--transition);
  margin-bottom: 2px;
  font-size: 13.5px;
  color: var(--text2);
  border: 1px solid transparent;
  user-select: none;
}
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--purple-bg); color: var(--purple-light); border-color: rgba(124,110,247,0.2); }
.nav-icon { font-size: 16px; flex-shrink: 0; width: 20px; text-align: center; }
.nav-badge {
  margin-left: auto; font-size: 10px; font-weight: 600;
  background: var(--bg4); color: var(--text2);
  border-radius: 20px; padding: 1px 7px;
}

#sidebar-footer {
  padding: 0.8rem;
  border-top: 1px solid var(--border);
}
.progress-mini { font-size: 11px; color: var(--text3); margin-bottom: 6px; display: flex; justify-content: space-between; }
.progress-bar-wrap { height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--teal)); border-radius: 2px; transition: width 0.5s ease; }

/* ===== MAIN ===== */
#main {
  margin-left: var(--sidebar);
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ===== TOPBAR ===== */
#topbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0.75rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky; top: 0; z-index: 50;
}
#search-wrap {
  flex: 1; max-width: 360px;
  position: relative;
}
#search-wrap span { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; }
#search {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 7px 12px 7px 32px;
  color: var(--text); font-size: 13px; font-family: var(--sans);
  transition: border-color var(--transition);
}
#search:focus { outline: none; border-color: rgba(124,110,247,0.4); }
#search::placeholder { color: var(--text3); }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.btn-outline {
  background: none; border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 6px 14px;
  font-size: 12.5px; color: var(--text2);
  transition: all var(--transition);
}
.btn-outline:hover { border-color: var(--purple); color: var(--purple-light); background: var(--purple-bg); }
.btn-primary {
  background: var(--purple); border: none;
  border-radius: var(--radius); padding: 7px 16px;
  font-size: 13px; color: white; font-weight: 500;
  transition: all var(--transition);
}
.btn-primary:hover { background: var(--purple-light); transform: translateY(-1px); }
#mobile-toggle { display: none; background: none; border: 1px solid var(--border); border-radius: var(--radius); padding: 7px 10px; color: var(--text2); font-size: 16px; }

/* ===== CONTENT ===== */
#content { padding: 1.5rem; flex: 1; }

/* ===== HOME PAGE ===== */
.home-hero {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 2.5rem 2rem;
  margin-bottom: 1.5rem;
  position: relative;
  overflow: hidden;
}
.home-hero::before {
  content: '';
  position: absolute; top: -60px; right: -60px;
  width: 220px; height: 220px;
  background: radial-gradient(circle, rgba(124,110,247,0.18), transparent 70%);
  pointer-events: none;
}
.home-hero::after {
  content: '';
  position: absolute; bottom: -40px; left: 30%;
  width: 160px; height: 160px;
  background: radial-gradient(circle, rgba(45,212,168,0.1), transparent 70%);
  pointer-events: none;
}
.hero-tag {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--purple-bg); border: 1px solid rgba(124,110,247,0.25);
  color: var(--purple-light); border-radius: 20px;
  padding: 4px 12px; font-size: 12px; font-weight: 500;
  margin-bottom: 1rem;
}
.home-hero h1 {
  font-family: var(--display); font-size: 2rem; font-weight: 700;
  line-height: 1.2; margin-bottom: 0.75rem;
}
.hero-gradient { background: linear-gradient(135deg, var(--purple-light), var(--teal)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.home-hero p { color: var(--text2); font-size: 14.5px; max-width: 500px; margin-bottom: 1.2rem; }
.hero-stats { display: flex; gap: 1.5rem; flex-wrap: wrap; }
.hero-stat { }
.hero-stat-num { font-family: var(--display); font-size: 1.4rem; font-weight: 700; color: var(--text); }
.hero-stat-lbl { font-size: 12px; color: var(--text3); }

.section-title { font-family: var(--display); font-size: 14px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.9rem; }

.modules-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
.module-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}
.module-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--card-accent, var(--purple));
  opacity: 0;
  transition: opacity var(--transition);
}
.module-card:hover { border-color: var(--border2); transform: translateY(-2px); }
.module-card:hover::before { opacity: 1; }
.card-head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
.card-icon {
  width: 40px; height: 40px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 19px; flex-shrink: 0;
}
.card-meta { flex: 1; }
.card-title { font-family: var(--display); font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.card-sub { font-size: 11.5px; color: var(--text3); }
.card-desc { font-size: 13px; color: var(--text2); line-height: 1.55; margin-bottom: 10px; }
.card-footer { display: flex; align-items: center; justify-content: space-between; }
.card-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.pill { font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: 500; }
.card-arrow { font-size: 14px; color: var(--text3); }

.quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
.quick-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 1.25rem;
  cursor: pointer; transition: all var(--transition);
  display: flex; align-items: center; gap: 14px;
}
.quick-card:hover { border-color: var(--border2); transform: translateY(-1px); }
.quick-icon { font-size: 28px; }
.quick-title { font-family: var(--display); font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.quick-sub { font-size: 12px; color: var(--text3); }

/* ===== MODULE VIEW ===== */
.breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text3); margin-bottom: 1.2rem; flex-wrap: wrap; }
.breadcrumb .sep { opacity: 0.4; }
.breadcrumb .crumb-link { cursor: pointer; transition: color var(--transition); }
.breadcrumb .crumb-link:hover { color: var(--purple-light); }
.breadcrumb .crumb-current { color: var(--text); }

.module-header {
  display: flex; align-items: center; gap: 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 1.2rem 1.4rem;
  margin-bottom: 1rem;
}
.module-header-icon { font-size: 26px; }
.module-header-title { font-family: var(--display); font-size: 17px; font-weight: 700; }
.module-header-desc { font-size: 13px; color: var(--text2); }
.module-tabs {
  display: flex; gap: 4px;
  background: var(--bg3); border-radius: var(--radius); padding: 4px;
  margin-bottom: 1.2rem; width: fit-content;
}
.tab-btn {
  background: none; border: none;
  padding: 7px 16px; border-radius: 8px;
  font-size: 13px; color: var(--text2);
  transition: all var(--transition);
  font-family: var(--sans);
}
.tab-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }

/* Lessons */
.lesson-wrap { display: grid; grid-template-columns: 200px 1fr; gap: 14px; }
.lesson-nav-list { display: flex; flex-direction: column; gap: 4px; }
.lesson-nav-item {
  background: none; border: 1px solid transparent;
  border-radius: var(--radius); padding: 8px 12px;
  font-size: 12.5px; text-align: left; color: var(--text2);
  cursor: pointer; transition: all var(--transition);
  display: flex; align-items: center; gap: 8px;
  font-family: var(--sans);
}
.lesson-nav-item:hover { background: var(--bg3); color: var(--text); }
.lesson-nav-item.active { background: var(--purple-bg); color: var(--purple-light); border-color: rgba(124,110,247,0.2); }
.lesson-num { font-size: 10px; font-weight: 700; width: 18px; height: 18px; border-radius: 50%; background: var(--bg4); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.lesson-content { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; }
.lesson-title { font-family: var(--display); font-size: 17px; font-weight: 600; margin-bottom: 0.9rem; }
.lesson-body { font-size: 14px; color: var(--text2); line-height: 1.7; margin-bottom: 1rem; }
.lesson-body code { font-family: var(--mono); font-size: 12.5px; background: var(--bg4); color: var(--purple-light); padding: 2px 5px; border-radius: 4px; }
.lesson-body strong { color: var(--text); font-weight: 500; }

.tips-box {
  background: var(--purple-bg);
  border: 1px solid rgba(124,110,247,0.2);
  border-radius: var(--radius); padding: 1rem;
  margin-bottom: 1rem;
}
.tips-title { font-size: 12px; font-weight: 600; color: var(--purple-light); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
.tip-item { font-size: 13px; color: var(--text); padding: 4px 0; display: flex; gap: 8px; }
.tip-arrow { color: var(--purple-light); flex-shrink: 0; }

.note-box {
  background: var(--bg3);
  border-left: 3px solid var(--teal);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 0.85rem 1rem;
  font-size: 13px; white-space: pre-wrap;
  line-height: 1.7; color: var(--text2); margin-bottom: 1rem;
}

pre.code-block {
  background: #0d0f18;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.2rem;
  font-family: var(--mono);
  font-size: 12.5px;
  line-height: 1.7;
  overflow-x: auto;
  color: #c8d0e8;
  margin-bottom: 1rem;
  tab-size: 2;
}
/* Syntax highlighting */
.kw { color: #c792ea; }
.fn { color: #82aaff; }
.str { color: #c3e88d; }
.cmt { color: #546e7a; font-style: italic; }
.attr { color: #ffcb6b; }
.num { color: #f78c6c; }
.cls { color: #ffcb6b; }
.var-c { color: #89ddff; }
.tag { color: #f07178; }
.op { color: #89ddff; }

.lesson-nav-btns { display: flex; justify-content: space-between; margin-top: 1.2rem; }
.btn-secondary {
  background: var(--bg4); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 8px 16px;
  font-size: 13px; color: var(--text2);
  transition: all var(--transition);
  display: flex; align-items: center; gap: 6px;
  font-family: var(--sans);
}
.btn-secondary:hover { background: var(--bg3); color: var(--text); }
.btn-go {
  background: var(--purple); border: none;
  border-radius: var(--radius); padding: 8px 18px;
  font-size: 13px; color: white; font-weight: 500;
  display: flex; align-items: center; gap: 6px;
  transition: all var(--transition);
  font-family: var(--sans);
}
.btn-go:hover { background: var(--purple-light); }

/* ===== QUIZ ===== */
.quiz-wrap { max-width: 640px; }
.quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.quiz-counter { font-size: 13px; color: var(--text3); }
.quiz-progress { flex: 1; height: 5px; background: var(--bg4); border-radius: 3px; margin: 0 12px; overflow: hidden; }
.quiz-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--teal)); border-radius: 3px; transition: width 0.4s ease; }
.quiz-question { font-family: var(--display); font-size: 16px; font-weight: 600; margin-bottom: 1.2rem; line-height: 1.4; }
.quiz-opts { display: flex; flex-direction: column; gap: 8px; }
.quiz-opt {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 16px;
  font-size: 14px; color: var(--text); cursor: pointer;
  display: flex; align-items: center; gap: 12px;
  transition: all var(--transition); text-align: left;
  font-family: var(--sans);
}
.quiz-opt:hover:not(:disabled) { border-color: var(--purple); background: var(--purple-bg); }
.quiz-opt:disabled { cursor: default; }
.quiz-opt.correct { border-color: var(--teal); background: var(--teal-bg); color: var(--teal); }
.quiz-opt.wrong { border-color: var(--coral); background: var(--coral-bg); color: var(--coral); }
.opt-letter {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--bg4); color: var(--text3);
  display: flex; align-items: center; justify-content: center;
  font-size: 11.5px; font-weight: 700; flex-shrink: 0;
  transition: all var(--transition);
}
.quiz-opt.correct .opt-letter { background: var(--teal); color: var(--bg); }
.quiz-opt.wrong .opt-letter { background: var(--coral); color: white; }
.quiz-next { margin-top: 1rem; display: flex; justify-content: flex-end; }

/* Results */
.result-wrap { text-align: center; padding: 2rem 1rem; max-width: 500px; margin: 0 auto; }
.result-score { font-family: var(--display); font-size: 4rem; font-weight: 700; margin-bottom: 0.3rem; }
.result-label { font-size: 16px; font-weight: 500; margin-bottom: 0.5rem; }
.result-msg { font-size: 14px; color: var(--text3); margin-bottom: 1.5rem; }
.result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; text-align: left; }
.result-stat { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.85rem 1rem; }
.result-stat-num { font-family: var(--display); font-size: 1.4rem; font-weight: 700; }
.result-stat-lbl { font-size: 12px; color: var(--text3); }
.review-list { text-align: left; }
.review-item { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.85rem 1rem; margin-bottom: 8px; }
.review-q { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
.review-ans { font-size: 12.5px; }

/* ===== FLASHCARDS ===== */
.fc-wrap { max-width: 580px; margin: 0 auto; }
.fc-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-xl); padding: 3rem 2rem;
  min-height: 220px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; transition: all 0.25s ease;
  margin-bottom: 1rem; position: relative;
}
.fc-card:hover { border-color: var(--border2); transform: translateY(-2px); }
.fc-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 1.2rem; }
.fc-term { font-family: var(--mono); font-size: 1.5rem; font-weight: 500; color: var(--purple-light); }
.fc-def { font-size: 15px; color: var(--text); line-height: 1.65; }
.fc-hint { font-size: 12px; color: var(--text3); margin-top: 1.5rem; }
.fc-controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 1rem; }
.fc-dots { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
.fc-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--bg4); transition: background 0.3s; }
.fc-dot.done { background: var(--teal); }
.fc-dot.current { background: var(--purple); }

/* ===== EXAM ===== */
.exam-hero {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-xl); padding: 2rem;
  text-align: center; margin-bottom: 1.5rem;
}
.exam-title { font-family: var(--display); font-size: 1.5rem; font-weight: 700; margin-bottom: 0.6rem; }
.exam-sub { font-size: 14px; color: var(--text2); margin-bottom: 1.2rem; }
.exam-meta { display: flex; gap: 1.5rem; justify-content: center; margin-bottom: 1.5rem; }
.exam-meta-item { text-align: center; }
.exam-meta-num { font-family: var(--display); font-size: 1.6rem; font-weight: 700; color: var(--purple-light); }
.exam-meta-lbl { font-size: 12px; color: var(--text3); }
.module-tag-chip {
  display: inline-flex; align-items: center;
  background: var(--coral-bg); border: 1px solid rgba(240,122,90,0.2);
  color: var(--coral); border-radius: 6px;
  padding: 3px 10px; font-size: 11.5px; font-weight: 500;
  margin-bottom: 0.75rem;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.25s ease forwards; }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  :root { --sidebar: 0px; }
  #sidebar { transform: translateX(-100%); width: 260px; }
  #sidebar.open { transform: translateX(0); }
  #main { margin-left: 0; }
  #mobile-toggle { display: flex; align-items: center; }
  .lesson-wrap { grid-template-columns: 1fr; }
  .lesson-nav-list { flex-direction: row; flex-wrap: wrap; }

namespace App\\Controller;

use Symfony\\Bundle\\FrameworkBundle\\Controller\\AbstractController;
use Symfony\\Component\\HttpFoundation\\Response;
use Symfony\\Component\\Routing\\Attribute\\Route;

use Symfony\\Component\\HttpFoundation\\Response;
use Symfony\\Component\\HttpFoundation\\JsonResponse;
use Symfony\\Component\\HttpFoundation\\RedirectResponse;

class MyController extends AbstractController
{
    // ✅ Réponse HTML via Twig
    public function page(): Response
    {
        return $this-\u003Erender('page.html.twig', [
            'title' =\u003E 'Ma page',
            'items' =\u003E ['a', 'b', 'c'],
        ]);
    }

    // ✅ Réponse JSON (pour API REST)
    public function api(): JsonResponse
    {
        return $this-\u003Ejson(['success' =\u003E true, 'data' =\u003E []]);
    }

    // ✅ Redirection vers une ROUTE nommée (interne)
    public function goHome(): RedirectResponse
    {
        return $this-\u003EredirectToRoute('app_users_list');
        // Avec paramètres : redirectToRoute('app_user_show', ['id' =\u003E 42])
    }

    // ✅ Redirection vers une URL externe
    public function goExternal(): RedirectResponse
    {
        return $this-\u003Eredirect('https://symfony.com');
    }

    // ✅ Déclencher une erreur 404
    public function notFound(): never
    {
        throw $this-\u003EcreateNotFoundException('Utilisateur introuvable');
    }
}`,

use Symfony\\Component\\HttpFoundation\\Request;

#[Route('/form', name: 'app_form', methods: ['GET', 'POST'])]
public function form(Request $request): Response
{
    // ===== VÉRIFIER LA MÉTHODE HTTP =====
    if ($request-\u003EisMethod('POST')) { ... }
    if ($request-\u003EisMethod('DELETE')) { ... }
    if ($request-\u003EisMethod('PUT')) { ... }

    // ===== DÉTECTER UNE REQUÊTE AJAX =====
    if ($request-\u003EisXmlHttpRequest()) {
        return $this-\u003Ejson(['status' =\u003E 'ok']);
    }

    // ===== DONNÉES POST (formulaire) =====
    $name  = $request-\u003Erequest-\u003Eget('name');
    $email = $request-\u003Erequest-\u003Eget('email', 'default@mail.com');

    // ===== PARAMÈTRES GET (?page=2&sort=asc) =====
    $page = $request-\u003Equery-\u003Eget('page', 1);
    $sort = $request-\u003Equery-\u003Eget('sort', 'asc');

    // ===== HEADERS HTTP =====
    $token = $request-\u003Eheaders-\u003Eget('Authorization');
    $type  = $request-\u003Eheaders-\u003Eget('Content-Type');

    // ===== FICHIERS UPLOADÉS =====
    $file = $request-\u003Efiles-\u003Eget('avatar');

    return $this-\u003Erender('form.html.twig');
}`,

// ⚠️ PROBLÈME : Les 2 routes peuvent capturer /articles/special

parameters:

services:
    # Configuration par défaut pour TOUS les services

    App\\:
        resource: '../src/'

            - '../src/Entity/'        # Les entités ne sont pas des services

// ===== 1. DÉFINIR L'INTERFACE =====
namespace App\\Service;

interface NotifierInterface
{
    public function send(string $to, string $message): void;
}

// ===== 2. LES IMPLÉMENTATIONS =====
class EmailNotifier implements NotifierInterface
{
    public function send(string $to, string $message): void
    {
        // Envoi par email...
        echo "Email envoyé à $to : $message";
    }
}

class SmsNotifier implements NotifierInterface
{
    public function send(string $to, string $message): void
    {
        // Envoi par SMS...
        echo "SMS envoyé à $to : $message";
    }
}

// ===== 3. UTILISER L'INTERFACE =====
class AlertService
{
    public function __construct(
        private NotifierInterface $notifier  // Interface = flexibilité !
    ) {}

    public function sendAlert(string $message): void
    {
        $this-\u003Enotifier-\u003Esend('admin@example.com', $message);
    }
}

// src/Controller/UserController.php
use App\\Entity\\User;
use App\\Form\\UserType;
use Doctrine\\ORM\\EntityManagerInterface;
use Symfony\\Component\\HttpFoundation\\Request;

class UserController extends AbstractController
{
    #[Route('/users/new', name: 'app_user_new', methods: ['GET', 'POST'])]
    public function new(Request $request, EntityManagerInterface $em): Response
    {
        $user = new User();

        // 1. Créer le formulaire — méthode createForm()
        $form = $this-\u003EcreateForm(UserType::class, $user);

        // 2. Lier la requête HTTP au formulaire
        $form-\u003EhandleRequest($request);

        // 3. Vérifier soumis ET valide
        if ($form-\u003EisSubmitted() && $form-\u003EisValid()) {

            // L'entité $user est AUTOMATIQUEMENT remplie par Symfony !
            // (grâce à data_class et handleRequest)

            // Récupérer un champ 'mapped: false'
            $plainPassword = $form-\u003Eget('password')-\u003EgetData();
            // Hasher le mot de passe...

            $em-\u003Epersist($user);   // Préparer l'insertion
            $em-\u003Eflush();          // Exécuter en BDD

            $this-\u003EaddFlash('success', 'Utilisateur créé avec succès !');
            return $this-\u003EredirectToRoute('app_users_list');
        }

        return $this-\u003Erender('user/new.html.twig', [
            'form' =\u003E $form,   // Passer le formulaire à Twig
        ]);
    }

    // ===== ÉDITION (même logique) =====
    #[Route('/users/{id}/edit', name: 'app_user_edit', methods: ['GET', 'POST'])]
    public function edit(User $user, Request $request, EntityManagerInterface $em): Response
    {
        $form = $this-\u003EcreateForm(UserType::class, $user);  // Pré-rempli avec $user
        $form-\u003EhandleRequest($request);

        if ($form-\u003EisSubmitted() && $form-\u003EisValid()) {
            $em-\u003Eflush();  // Pas besoin de persist() pour une mise à jour !
            return $this-\u003EredirectToRoute('app_users_list');
        }

        return $this-\u003Erender('user/edit.html.twig', ['form' =\u003E $form, 'user' =\u003E $user]);
    }
}`,

namespace App\\Entity;

use App\\Repository\\ProductRepository;
use Doctrine\\ORM\\Mapping as ORM;
use Symfony\\Component\\Validator\\Constraints as Assert;

#[ORM\\Entity(repositoryClass: ProductRepository::class)]
#[ORM\\Table(name: 'products')]
class Product
{
    #[ORM\\Id]
    #[ORM\\GeneratedValue]
    #[ORM\\Column]
    private ?int $id = null;

    #[ORM\\Column(length: 255)]
    #[Assert\\NotBlank]
    private ?string $name = null;

    #[ORM\\Column(type: 'decimal', precision: 10, scale: 2)]

    #[ORM\\Column(type: 'text', nullable: true)]

    public function __construct()
    {
        $this-\u003EcreatedAt = new \\DateTimeImmutable();
    }

    // Getters & Setters (générés automatiquement par make:entity)
    public function getId(): ?int { return $this-\u003Eid; }
    public function getName(): ?string { return $this-\u003Ename; }
    public function setName(string $name): static {
        $this-\u003Ename = $name;
        return $this;
    }
    // ...
}`,

        code:`\u003C?php
use Doctrine\\ORM\\EntityManagerInterface;
use App\\Repository\\ProductRepository;

class ProductController extends AbstractController
{
    public function __construct(
        private EntityManagerInterface $em,
        private ProductRepository $productRepo
    ) {}

    // ===== CRÉER (INSERT) =====
    public function create(): Response
    {
        $product = new Product();
        $product-\u003EsetName('iPhone 16');
        $product-\u003EsetPrice(1099.99);
        $product-\u003EsetDescription('Nouveau smartphone Apple');

        $this-\u003Eem-\u003Epersist($product);  // "Je veux sauvegarder cet objet"
        $this-\u003Eem-\u003Eflush();            // Exécute le SQL INSERT en BDD

        return $this-\u003EredirectToRoute('products_list');
    }

    // ===== LIRE (SELECT) =====
    public function list(): Response
    {
        $all      = $this-\u003EproductRepo-\u003EfindAll();             // Tous
        $one      = $this-\u003EproductRepo-\u003Efind(42);              // Par ID
        $by_name  = $this-\u003EproductRepo-\u003EfindBy(['name' =\u003E 'iPhone']); // Avec filtre
        $one_by   = $this-\u003EproductRepo-\u003EfindOneBy(['name' =\u003E 'iPhone']); // Un seul
        $ordered  = $this-\u003EproductRepo-\u003EfindBy([], ['price' =\u003E 'DESC']); // Trié

        return $this-\u003Erender('product/list.html.twig', ['products' =\u003E $all]);
    }

    // ===== METTRE À JOUR (UPDATE) =====
    public function update(Product $product): Response
    {
        $product-\u003EsetPrice(999.99);  // Modifier l'objet
        // Pas besoin de persist() si l'entité est déjà "managée" par Doctrine
        $this-\u003Eem-\u003Eflush();          // Exécute le SQL UPDATE

        return $this-\u003EredirectToRoute('products_list');
    }

    // ===== SUPPRIMER (DELETE) =====
    public function delete(Product $product): Response
    {
        $this-\u003Eem-\u003Eremove($product);  // "Je veux supprimer cet objet"
        $this-\u003Eem-\u003Eflush();           // Exécute le SQL DELETE

        return $this-\u003EredirectToRoute('products_list');
    }
}

// ===== REPOSITORY PERSONNALISÉ =====
class ProductRepository extends ServiceEntityRepository
{
    // Méthode personnalisée avec QueryBuilder
    public function findExpensive(float $minPrice): array
    {
        return $this-\u003EcreateQueryBuilder('p')
            -\u003Ewhere('p.price \u003E= :price')
            -\u003EsetParameter('price', $minPrice)
            -\u003EorderBy('p.price', 'DESC')
            -\u003EsetMaxResults(10)
            -\u003EgetQuery()
            -\u003EgetResult();
    }
}`,
        note:'💡 RÉSUMÉ :\n• persist() → marque pour INSERT (nouveau)\n• flush() → exécute TOUTES les opérations en attente\n• remove() → marque pour DELETE\n• Pour UPDATE : pas de persist(), juste flush()',
        tips:['EntityManager → écriture (INSERT, UPDATE, DELETE)','Repository → lecture (SELECT)','persist() + flush() → INSERT','remove() + flush() → DELETE','Pour UPDATE : modifier l\'objet + flush() seulement']

        body:`<p>Doctrine gère les relations entre entités (tables). Voici les 3 types fondamentaux.</p>`,
        code:`\u003C?php
// ===== OneToOne — Un User ↔ Un Profil =====
// Un utilisateur a UN seul profil. Un profil appartient à UN seul user.

class User
{
    #[ORM\\OneToOne(targetEntity: Profile::class, cascade: ['persist', 'remove'])]
    #[ORM\\JoinColumn(nullable: false)]
    private Profile $profile;
}

// ===== OneToMany / ManyToOne — Un Auteur ↔ Plusieurs Livres =====
// Un auteur peut avoir PLUSIEURS livres.
// Chaque livre appartient à UN seul auteur.

class Author
{
    #[ORM\\OneToMany(targetEntity: Book::class, mappedBy: 'author', cascade: ['persist'])]
    private Collection $books;    // ← Collection (plusieurs)

    public function __construct()
    {
        $this-\u003Ebooks = new ArrayCollection();
    }
}

class Book
{
    #[ORM\\ManyToOne(targetEntity: Author::class, inversedBy: 'books')]
    #[ORM\\JoinColumn(nullable: false)]
    private Author $author;       // ← Entité simple (un seul)
}

// ===== ManyToMany — Produits ↔ Catégories =====
// Un produit peut avoir PLUSIEURS catégories.
// Une catégorie peut avoir PLUSIEURS produits.
// → Doctrine crée une table intermédiaire automatiquement !

class Product
{
    #[ORM\\ManyToMany(targetEntity: Category::class, inversedBy: 'products')]
    #[ORM\\JoinTable(name: 'product_categories')]
    private Collection $categories;
}

class Category
{
    #[ORM\\ManyToMany(targetEntity: Product::class, mappedBy: 'categories')]
    private Collection $products;
}

// ===== UTILISER LES RELATIONS =====
$author = new Author();
$book = new Book();
$book-\u003EsetAuthor($author);      // Lier le livre à l'auteur
$em-\u003Epersist($book);
$em-\u003Eflush();

// Accéder aux livres d'un auteur :
foreach ($author-\u003EgetBooks() as $book) {
    echo $book-\u003EgetTitle();
}`,

# 1. Modifier votre entité (ajouter un champ, une relation...)
$ php bin/console make:entity Product   # Ajouter un champ

# 2. Générer le fichier de migration

// ===== #[MapEntity] — Injection automatique avec 404 =====

// AVANT (sans MapEntity) :
#[Route('/books/{id}', name: 'book_show')]
public function show(int $id, BookRepository $repo): Response
{
    $book = $repo-\u003Efind($id);
    if (!$book) {
        throw $this-\u003EcreateNotFoundException('Livre introuvable');
    }
    return $this-\u003Erender('book/show.html.twig', ['book' =\u003E $book]);
}

// APRÈS (avec MapEntity) — plus concis !
#[Route('/books/{id}', name: 'book_show', methods: ['GET'])]
public function show(
    #[MapEntity(id: 'id')] Book $book  // ← Auto-fetch + 404 automatique !
): Response {
    // Si le livre n'existe pas → Symfony lance automatiquement une 404
    return $this-\u003Erender('book/show.html.twig', ['book' =\u003E $book]);
}

// Avec un paramètre personnalisé (ISBN par exemple) :
#[Route('/books/{isbn}', name: 'book_by_isbn',
    requirements: ['isbn' =\u003E '\\w+']
)]
public function showByIsbn(

namespace App\\Security;

        $password = $request-\u003Erequest-\u003Eget('password', '');
        $csrf     = $request-\u003Erequest-\u003Eget('_csrf_token', '');

            new PasswordCredentials($password), // Vérifie le mot de passe

let state = {

// ===== NAVIGATION =====
function setActiveNav(id) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('nav-' + id);
  if (el) el.classList.add('active');
}

function showHome() {
  state.view = 'home';
  setActiveNav('home');
  closeSidebar();
  renderContent();
}

function showModule(id) {
  state.view = 'module';
  state.moduleId = id;
  state.lessonIdx = 0;
  state.tab = 'lessons';
  state.quizIdx = 0;
  state.quizAnswers = [];
  state.quizDone = false;
  setActiveNav(id);
  closeSidebar();
  renderContent();
  window.scrollTo(0, 0);
}

function showFlashcards() {
  state.view = 'flashcards';
  state.fcIdx = 0;
  state.fcFlipped = false;
  setActiveNav('fc');
  closeSidebar();
  renderContent();
  window.scrollTo(0, 0);
}

function showExam() {
  state.view = 'exam';
  state.quizIdx = 0;
  state.quizAnswers = [];
  state.quizDone = false;
  state.examStarted = false;
  setActiveNav('exam');
  closeSidebar();
  renderContent();
  window.scrollTo(0, 0);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// ===== SEARCH =====
function handleSearch(val) {
  if (!val.trim()) return;
  const q = val.toLowerCase();
  for (const [id, m] of Object.entries(MODULES)) {
    for (let i = 0; i < m.lessons.length; i++) {
      const l = m.lessons[i];
      if (l.title.toLowerCase().includes(q) || (l.body||'').toLowerCase().includes(q) || (l.code||'').toLowerCase().includes(q)) {
        state.view = 'module';
        state.moduleId = id;
        state.lessonIdx = i;
        state.tab = 'lessons';
        setActiveNav(id);
        renderContent();
        return;
      }
    }
  }
}

// ===== RENDER =====
function renderContent() {
  const c = document.getElementById('content');
  c.innerHTML = '';
  const el = document.createElement('div');
  el.className = 'fade-in';
  if (state.view === 'home') el.innerHTML = buildHome();
  else if (state.view === 'module') el.innerHTML = buildModule();
  else if (state.view === 'flashcards') el.innerHTML = buildFlashcards();
  else if (state.view === 'exam') el.innerHTML = buildExam();
  c.appendChild(el);
  updateProgress();
}

  if (!m) return buildHome();

  const lessonNav = m.lessons.map((l, i) => `
    <button class="lesson-nav-item ${state.lessonIdx === i ? 'active' : ''}"
      onclick="goLesson(${i})">
      <span class="lesson-num">${i+1}</span>
      ${l.title}
    </button>`).join('');

  const tabBtns = `
    <div class="module-tabs">
      <button class="tab-btn ${state.tab==='lessons'?'active':''}" onclick="setTab('lessons')">📚 Leçons</button>
      <button class="tab-btn ${state.tab==='quiz'?'active':''}" onclick="setTab('quiz')">🧪 Quiz</button>
    </div>`;

  let tabContent = '';
  if (state.tab === 'lessons') {
    const l = m.lessons[state.lessonIdx];
    const tips = (l.tips && l.tips.length) ? `

        ${l.tips.map(t => `<div class="tip-item"><span class="tip-arrow">›</span><span>${t}</span></div>`).join('')}
      </div>` : '';
    const note = l.note ? `<div class="note-box">${l.note}</div>` : '';
    const code = l.code ? `<pre class="code-block">${highlight(esc(l.code))}</pre>` : '';
    const prevBtn = state.lessonIdx > 0
      ? `<button class="btn-secondary" onclick="goLesson(${state.lessonIdx-1})">← Précédent</button>`
      : '<span></span>';
    const nextBtn = state.lessonIdx < m.lessons.length - 1
      ? `<button class="btn-go" onclick="goLesson(${state.lessonIdx+1})">Suivant →</button>`
      : `<button class="btn-go" onclick="setTab('quiz')">Faire le quiz ✓</button>`;

    tabContent = `
      <div class="lesson-wrap">
        <div class="lesson-nav-list">${lessonNav}</div>
        <div class="lesson-content">
          <h2 class="lesson-title">${l.title}</h2>
          <div class="lesson-body">${l.body||''}</div>

function buildQuiz(m) {
  if (state.quizDone) {
    const score = state.quizAnswers.filter((a, i) => a === m.quiz[i].ans).length;
    const pct = Math.round(score / m.quiz.length * 100);
    const clr = pct >= 80 ? '#2dd4a8' : pct >= 50 ? '#f5c842' : '#f06060';
    const reviews = m.quiz.map((q, i) => {
      const ok = state.quizAnswers[i] === q.ans;
      return `<div class="review-item">
        <div class="review-q">${i+1}. ${q.q}</div>
        <div class="review-ans" style="color:${ok?'#2dd4a8':'#f06060'}">
          ${ok ? '✅' : '❌'} ${q.opts[q.ans]}
          ${!ok ? `<span style="color:var(--text3)"> · Votre réponse : ${q.opts[state.quizAnswers[i]]??'—'}</span>` : ''}
        </div>
      </div>`;
    }).join('');
    return `<div class="result-wrap">
      <div class="result-score" style="color:${clr}">${pct}%</div>
      <div class="result-label">${score}/${m.quiz.length} bonnes réponses</div>
      <div class="result-msg">${pct>=80?'🎉 Excellent ! Vous maîtrisez ce module.':pct>=50?'📚 Bien ! Continuez à réviser.':'💪 Relisez les leçons et réessayez !'}</div>
      <div class="result-grid">
        <div class="result-stat"><div class="result-stat-num" style="color:#2dd4a8">${score}</div><div class="result-stat-lbl">Correctes</div></div>
        <div class="result-stat"><div class="result-stat-num" style="color:#f06060">${m.quiz.length-score}</div><div class="result-stat-lbl">Incorrectes</div></div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:1.5rem">
        <button class="btn-go" style="flex:1" onclick="resetQuiz()">Recommencer</button>
        <button class="btn-secondary" style="flex:1" onclick="setTab('lessons')">Revoir les leçons</button>
      </div>
      <div class="review-list">${reviews}</div>
    </div>`;
  }

  const q = m.quiz[state.quizIdx];
  const pct = Math.round(state.quizIdx / m.quiz.length * 100);
  const answered = state.quizAnswers[state.quizIdx] !== undefined;
  const userAns = state.quizAnswers[state.quizIdx];

  const opts = q.opts.map((o, i) => {
    let cls = '';
    if (answered) {
      if (i === q.ans) cls = 'correct';
      else if (i === userAns) cls = 'wrong';
    }
    return `<button class="quiz-opt ${cls}" ${answered?'disabled':''} onclick="answerQuiz(${i})">
      <span class="opt-letter">${String.fromCharCode(65+i)}</span>
      ${esc(o)}
    </button>`;
  }).join('');

  const nextBtn = answered ? `
    <div class="quiz-next">
      ${state.quizIdx < m.quiz.length-1
        ? `<button class="btn-go" onclick="nextQ()">Question suivante →</button>`
        : `<button class="btn-go" onclick="finishQuiz()">Voir les résultats ✓</button>`}
    </div>` : '';

  return `<div class="quiz-wrap">
    <div class="quiz-header">
      <span class="quiz-counter">Question ${state.quizIdx+1}/${m.quiz.length}</span>
      <div class="quiz-progress"><div class="quiz-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="quiz-question">${esc(q.q)}</div>
    <div class="quiz-opts">${opts}</div>
    ${nextBtn}
  </div>`;
}

// ===== FLASHCARDS =====
function buildFlashcards() {
  const fc = FLASHCARDS[state.fcIdx];
  const dots = FLASHCARDS.map((_, i) => `<div class="fc-dot ${i<state.fcIdx?'done':i===state.fcIdx?'current':''}"></div>`).join('');
  return `
<div class="breadcrumb">
  <span class="crumb-link" onclick="showHome()">🏠 Accueil</span>
  <span class="sep">/</span>
  <span class="crumb-current">Flashcards</span>
</div>
<div class="fc-wrap">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
    <h2 style="font-family:var(--display);font-size:17px;font-weight:600">Flashcards Symfony</h2>
    <span style="font-size:13px;color:var(--text3)">${state.fcIdx+1} / ${FLASHCARDS.length}</span>
  </div>
  <div style="height:4px;background:var(--bg4);border-radius:2px;margin-bottom:1.5rem;overflow:hidden">
    <div style="height:100%;width:${Math.round((state.fcIdx+1)/FLASHCARDS.length*100)}%;background:linear-gradient(90deg,var(--purple),var(--teal));border-radius:2px;transition:width 0.4s ease"></div>
  </div>
  <div class="fc-card" onclick="flipCard()">
    <div class="fc-label">${state.fcFlipped ? 'Définition' : 'Terme'}</div>
    ${state.fcFlipped
      ? `<div class="fc-def">${esc(fc.a)}</div>`
      : `<div class="fc-term">${esc(fc.q)}</div>`}
    <div class="fc-hint">Cliquer pour ${state.fcFlipped ? 'voir le terme' : 'voir la définition'}</div>
  </div>
  <div class="fc-controls">
    <button class="btn-secondary" onclick="prevFC()" ${state.fcIdx===0?'disabled':''}>← Précédente</button>
    <button class="btn-go" onclick="nextFC()">${state.fcIdx<FLASHCARDS.length-1?'Suivante →':'Recommencer ↺'}</button>
  </div>
  <div class="fc-dots" style="margin-top:1rem">${dots}</div>
</div>`;
}

// ===== MODE QCM (ancien) =====
function buildExamQCM() {
  const allQ = Object.values(MODULES).flatMap(m => m.quiz.map(q => ({...q, module: m.title})));

  if (state.quizDone) {
    const score = state.quizAnswers.filter((a,i) => a === allQ[i].ans).length;
    const pct = Math.round(score / allQ.length * 100);
    const clr = pct >= 80 ? '#2dd4a8' : pct >= 50 ? '#f5c842' : '#f06060';
    const reviews = allQ.map((q,i) => {
      const ok = state.quizAnswers[i] === q.ans;
      return `<div class="review-item">
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px">${q.module}</div>
        <div class="review-q">${i+1}. ${q.q}</div>
        <div class="review-ans" style="color:${ok?'#2dd4a8':'#f06060'}">
          ${ok?'✅':'❌'} ${q.opts[q.ans]}
          ${!ok?`<span style="color:var(--text3)"> · Votre réponse : ${q.opts[state.quizAnswers[i]]??'—'}</span>`:''}
        </div>
      </div>`;
    }).join('');
    return `<div class="result-wrap" style="max-width:680px;margin:0 auto">
      <div class="result-score" style="color:${clr}">${pct}%</div>
      <div class="result-label">${score}/${allQ.length} bonnes réponses</div>
      <div class="result-msg">${pct>=80?'🎉 Excellent !':pct>=50?'📚 Continuez à réviser !':'💪 Relisez les modules !'}</div>
      <div style="display:flex;gap:8px;margin-bottom:1.5rem">
        <button class="btn-go" style="flex:1" onclick="startExamMode('qcm')">Recommencer QCM</button>
        <button class="btn-secondary" style="flex:1" onclick="state.examStarted=false;renderContent()">Choisir le mode</button>
      </div>
      <div class="review-list">${reviews}</div>
    </div>`;
  }

  const q = allQ[state.quizIdx];
  const pct = Math.round(state.quizIdx / allQ.length * 100);
  const answered = state.quizAnswers[state.quizIdx] !== undefined;
  const userAns = state.quizAnswers[state.quizIdx];

  const opts = q.opts.map((o,i) => {
    let cls = '';
    if (answered) { if (i===q.ans) cls='correct'; else if (i===userAns) cls='wrong'; }
    return `<button class="quiz-opt ${cls}" ${answered?'disabled':''} onclick="answerExam(${i},${allQ.length})">
      <span class="opt-letter">${String.fromCharCode(65+i)}</span>${esc(o)}
    </button>`;
  }).join('');

  return `<div class="quiz-wrap" style="max-width:680px;margin:0 auto">
    <div class="quiz-header">
      <button class="btn-secondary" onclick="state.examStarted=false;renderContent()" style="padding:4px 10px;font-size:12px">✕</button>
      <div class="quiz-progress"><div class="quiz-fill" style="width:${pct}%"></div></div>
      <span class="quiz-counter">${state.quizIdx+1}/${allQ.length}</span>
    </div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:4px">🎯 Mode QCM · ${q.module}</div>
    <div class="quiz-question">${esc(q.q)}</div>
    <div class="quiz-opts">${opts}</div>
    ${answered ? `<div class="quiz-next">
      ${state.quizIdx < allQ.length-1
        ? `<button class="btn-go" onclick="nextExam(${allQ.length})">Suivant →</button>`
        : `<button class="btn-go" onclick="finishExam()">Voir résultats ✓</button>`}
    </div>` : ''}
  </div>`;
}

// ===== MODE PDF =====
function buildExamPDF() {
  if (state.pdfSubmitted) return buildExamPDFResults();

  const sections = [...new Set(EXAM_PDF.map(q => q.section))];
  let html = `
<div style="max-width:720px;margin:0 auto">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.5rem">
    <button class="btn-secondary" onclick="state.examStarted=false;renderContent()" style="padding:6px 12px;font-size:12px">← Retour</button>
    <div style="flex:1">
      <div style="font-family:var(--display);font-weight:700;font-size:16px">Examen Blanc Symfony 2026 — EHEIO</div>
      <div style="font-size:12px;color:var(--text3)">Ceci est un examen blanc qui vous aide à mieux vous préparer à l'examen</div>
    </div>
  </div>`;

  sections.forEach(section => {
    const sectionQs = EXAM_PDF.filter(q => q.section === section);
    const sectionIdx = EXAM_PDF.indexOf(sectionQs[0]);
    html += `
  <div style="margin-bottom:2rem">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:0.6rem 0;border-bottom:1px solid var(--border);margin-bottom:1rem">
      <div style="font-size:13px;font-weight:500;color:var(--text3)">${section}</div>
      <div style="font-size:12px;color:var(--text3)">0 point(s) sur 0</div>
    </div>`;

    sectionQs.forEach(q => {
      const qIdx = EXAM_PDF.indexOf(q);
      html += buildPDFQuestion(q, qIdx);
    });

    html += `</div>`;
  });

  html += `
  <div style="text-align:center;padding:2rem 0">
    <button onclick="submitPDFExam()" class="btn-go" style="font-size:15px;padding:14px 40px">
      ✅ Soumettre l'examen et voir les corrections
    </button>
  </div>
</div>`;
  return html;
}

function buildPDFQuestion(q, idx) {
  const stateKey = 'pdf_' + idx;

  if (q.type === 'open') {
    return `
<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:10px">
  <div style="font-size:14px;font-weight:500;line-height:1.5;margin-bottom:1rem">${q.q}</div>
  <textarea id="pdf_ans_${idx}" rows="3" placeholder="Votre réponse..." oninput="savePDFAnswer(${idx}, this.value)"
    style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px;color:var(--text);font-family:var(--sans);font-size:13px;resize:vertical;line-height:1.6">${state.pdfAnswers[idx] || ''}</textarea>
</div>`;
  }

  if (q.type === 'dropdown') {
    const cur = state.pdfAnswers[idx];
    return `
<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:10px">
  <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:0.75rem">
    <div style="font-size:14px;font-weight:500;line-height:1.5;flex:1">${q.q}</div>
    <span style="font-size:11px;background:var(--bg4);color:var(--text3);padding:3px 8px;border-radius:6px;white-space:nowrap;flex-shrink:0">⊙ Dropdown</span>
  </div>
  <select onchange="savePDFAnswer(${idx}, parseInt(this.value))"
    style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;color:var(--text);font-family:var(--sans);font-size:13px;width:200px">
    <option value="-1" ${cur===undefined?'selected':''}>Sélectionner</option>
    ${q.opts.map((o,i) => `<option value="${i}" ${cur===i?'selected':''}>${o}</option>`).join('')}
  </select>
</div>`;
  }

  if (q.type === 'checkbox') {
    const cur = state.pdfAnswers[idx] || [];
    return `
<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:10px">
  <div style="font-size:14px;font-weight:500;line-height:1.5;margin-bottom:1rem">${q.q}</div>
  <div style="display:flex;flex-direction:column;gap:8px">
    ${q.opts.map((o,i) => `
    <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);font-size:13px">
      <input type="checkbox" ${cur.includes(i)?'checked':''} onchange="togglePDFCheckbox(${idx}, ${i}, this.checked)"
        style="width:16px;height:16px;accent-color:var(--purple);cursor:pointer">
      <span>${o}</span>
    </label>`).join('')}
  </div>
</div>`;
  }
  return '';
}

function buildExamPDFResults() {
  let totalQ = EXAM_PDF.length;
  let scored = 0;
  let html = `<div style="max-width:720px;margin:0 auto">
    <div style="text-align:center;margin-bottom:2rem">
      <div style="font-family:var(--display);font-size:1.2rem;font-weight:700;margin-bottom:4px">📋 Correction — Examen Blanc EHEIO 2026</div>
      <div style="font-size:13px;color:var(--text3)">Voici vos réponses avec les corrections</div>
    </div>`;

  const sections = [...new Set(EXAM_PDF.map(q => q.section))];
  sections.forEach(section => {
    const sectionQs = EXAM_PDF.filter(q => q.section === section);
    html += `<div style="margin-bottom:2rem">
      <div style="font-size:13px;font-weight:600;color:var(--purple-light);padding:0.5rem 0;border-bottom:1px solid var(--border);margin-bottom:1rem">${section}</div>`;

    sectionQs.forEach(q => {
      const qIdx = EXAM_PDF.indexOf(q);
      const userAns = state.pdfAnswers[qIdx];
      let isOk = false;
      let userDisplay = '';
      let correctDisplay = '';

      if (q.type === 'open') {
        isOk = userAns && userAns.trim().length > 3;
        userDisplay = userAns || '(pas de réponse)';
        correctDisplay = q.ans;
      } else if (q.type === 'dropdown') {
        isOk = userAns === q.ans;
        userDisplay = userAns !== undefined && userAns >= 0 ? q.opts[userAns] : '(pas de réponse)';
        correctDisplay = q.opts[q.ans];
      } else if (q.type === 'checkbox') {
        const userArr = userAns || [];
        isOk = JSON.stringify([...userArr].sort()) === JSON.stringify([...q.ans].sort());
        userDisplay = userArr.length ? userArr.map(i => q.opts[i]).join(', ') : '(pas de réponse)';
        correctDisplay = q.ans.map(i => q.opts[i]).join(', ');
      }

      if (isOk) scored++;

      html += `
      <div style="background:var(--surface);border:1px solid ${isOk?'#2dd4a830':'#f0606030'};border-left:3px solid ${isOk?'#2dd4a8':'#f06060'};border-radius:var(--radius);padding:1rem;margin-bottom:8px">
        <div style="font-size:13px;font-weight:500;margin-bottom:8px;line-height:1.4">${isOk?'✅':'❌'} ${q.q}</div>
        ${q.type === 'open' ? `
          <div style="font-size:12px;color:var(--text3);margin-bottom:4px">Votre réponse :</div>
          <div style="font-size:12.5px;background:var(--bg3);border-radius:6px;padding:8px 10px;margin-bottom:8px;white-space:pre-wrap;line-height:1.6">${userDisplay || '<em style="color:var(--text3)">Pas de réponse</em>'}</div>
          <div style="font-size:12px;color:#2dd4a8;margin-bottom:4px">✅ Bonne réponse :</div>
          <div style="font-size:12.5px;background:rgba(45,212,168,0.08);border:1px solid rgba(45,212,168,0.2);border-radius:6px;padding:8px 10px;white-space:pre-wrap;line-height:1.6;color:var(--text)">${correctDisplay}</div>
        ` : `
          <div style="display:flex;flex-wrap:wrap;gap:12px;font-size:12.5px">
            <div><span style="color:var(--text3)">Votre réponse : </span><span style="color:${isOk?'#2dd4a8':'#f06060'}">${userDisplay}</span></div>
            ${!isOk?`<div><span style="color:var(--text3)">Bonne réponse : </span><span style="color:#2dd4a8">${correctDisplay}</span></div>`:''}
          </div>
        `}
        <div style="font-size:11.5px;color:var(--text3);margin-top:8px;font-style:italic">💡 ${q.hint}</div>
      </div>`;
    });
    html += `</div>`;
  });

  const pct = Math.round(scored / totalQ * 100);
  const clr = pct >= 75 ? '#2dd4a8' : pct >= 50 ? '#f5c842' : '#f06060';

  html = `<div style="text-align:center;padding:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);margin-bottom:1.5rem">
    <div style="font-family:var(--display);font-size:2.5rem;font-weight:700;color:${clr}">${pct}%</div>
    <div style="font-size:15px;font-weight:500;margin-bottom:4px">${scored}/${totalQ} questions réussies</div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:1rem">${pct>=75?'🎉 Excellent ! Vous êtes prêt pour l\'examen !':pct>=50?'📚 Bon travail, continuez à réviser.':'💪 Relisez les modules et réessayez !'}</div>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn-go" onclick="startExamMode('pdf')">Recommencer</button>
      <button class="btn-secondary" onclick="state.examStarted=false;renderContent()">Choisir le mode</button>
    </div>
  </div>` + html + `</div>`;

  return html;
}

// ===== ACTIONS =====
function setTab(t) { state.tab=t; state.quizIdx=0; state.quizAnswers=[]; state.quizDone=false; renderContent(); }
function goLesson(i) { state.lessonIdx=i; renderContent(); window.scrollTo(0,0); }
function answerQuiz(i) { if(state.quizAnswers[state.quizIdx]===undefined){ state.quizAnswers[state.quizIdx]=i; renderContent(); }}
function nextQ() { state.quizIdx++; renderContent(); }
function finishQuiz() { state.quizDone=true; renderContent(); }
function resetQuiz() { state.quizIdx=0; state.quizAnswers=[]; state.quizDone=false; renderContent(); }
function flipCard() { state.fcFlipped=!state.fcFlipped; renderContent(); }
function nextFC() { if(state.fcIdx<FLASHCARDS.length-1){state.fcIdx++;state.fcFlipped=false;}else{state.fcIdx=0;state.fcFlipped=false;} renderContent(); }
function prevFC() { if(state.fcIdx>0){state.fcIdx--;state.fcFlipped=false;renderContent();} }
function startExam() { state.examStarted=true; state.quizIdx=0; state.quizAnswers=[]; state.quizDone=false; renderContent(); }

function savePDFAnswer(idx, val) {
  state.pdfAnswers[idx] = val;
}
function togglePDFCheckbox(idx, optIdx, checked) {
  if (!state.pdfAnswers[idx]) state.pdfAnswers[idx] = [];
  if (checked) { if (!state.pdfAnswers[idx].includes(optIdx)) state.pdfAnswers[idx].push(optIdx); }
  else { state.pdfAnswers[idx] = state.pdfAnswers[idx].filter(x => x !== optIdx); }
}
function submitPDFExam() {
  state.pdfSubmitted = true;
  renderContent();
  window.scrollTo(0,0);
}
function startExamMode(mode) {
  state.examMode = mode;
  state.examStarted = true;
  state.quizIdx = 0;
  state.quizAnswers = [];
  state.quizDone = false;
  state.pdfAnswers = {};
  state.pdfSubmitted = false;
  renderContent();
  window.scrollTo(0,0);
}

function answerExam(i,total) { if(state.quizAnswers[state.quizIdx]===undefined){state.quizAnswers[state.quizIdx]=i;renderContent();}}
function nextExam(total) { state.quizIdx++; renderContent(); }
function finishExam() { state.quizDone=true; renderContent(); }

// ===== PROGRESS =====
function updateProgress() {
  const visited = Object.keys(state.progress).length;
  const pct = Math.min(100, Math.round((visited / 6) * 100));
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-txt').textContent = pct + '%';
}

// ===== HELPERS =====
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(code) {
  // Basic syntax highlighting
  return code
    // Comments
    .replace(/(\/\/.*$|#.*$|\/\*[\s\S]*?\*\/|\{#[\s\S]*?#\})/gm, '<span class="cmt">$1</span>')
    // PHP keywords
    .replace(/\b(public|private|protected|static|function|class|namespace|use|new|return|if|else|elseif|foreach|for|while|extends|implements|interface|abstract|readonly|null|true|false|throw|try|catch|void|string|int|float|bool|array|never|self|parent)\b/g, '<span class="kw">$1</span>')
    // PHP/Twig strings
    .replace(/('[^']*'|"[^"]*")/g, '<span class="str">$1</span>')
    // Attributes/annotations
    .replace(/(#\[[\w\\:]+)/g, '<span class="attr">$1</span>')
    // Twig {{}} {%%}
    .replace(/({{|}}|{%|%})/g, '<span class="op">$1</span>')
    // Variables
    .replace(/(\$\w+)/g, '<span class="var-c">$1</span>')
    // Numbers
    .replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>')
    // PHP tags
    .replace(/(&lt;\?php|&lt;\?=|\?&gt;)/g, '<span class="tag">$1</span>');
}

// ===== INIT =====
renderContent();
</script>
